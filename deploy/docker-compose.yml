version: "3.9"

services:
  unthinkclaw:
    image: ghcr.io/undivisible/unthinkclaw:latest
    command: ["gateway", "--config", "/app/unthinkclaw.json"]
    ports:
      - "8080:8080"
    environment:
      UNTHINKCLAW_GATEWAY_TOKEN: "replace-me"
      RUST_LOG: "info"
    volumes:
      - ../unthinkclaw.json:/app/unthinkclaw.json:ro
      - unthinkclaw_state:/app/.unthinkclaw

volumes:
  unthinkclaw_state:
