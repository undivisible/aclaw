version: "3.9"

services:
  unthinkclaw:
    image: ghcr.io/undivisible/unthinkclaw:latest
    command: ["gateway", "--config", "/app/unthinkclaw.json"]
    ports:
      - "8080:8080"
    environment:
      UNTHINKCLAW_GATEWAY_TOKEN: "replace-me"
      RUST_LOG: "info"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    volumes:
      - ../unthinkclaw.json:/app/unthinkclaw.json:ro
      - unthinkclaw_state:/app/.unthinkclaw
  otel-collector:
    image: otel/opentelemetry-collector:0.121.0
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro

volumes:
  unthinkclaw_state:
